<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tauri Kiosk by LNU</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <main class="layout">
      <section class="browser-surface">
        <div class="direct-open-shell" id="direct-open-shell">
          <p>Direct open mode (no iframe).</p>
          <div class="direct-open-actions">
            <button type="button" id="open-direct-btn" class="settings-btn settings-btn--primary">
              Open Home URL
            </button>
            <button type="button" id="open-netflix-btn" class="settings-btn settings-btn--danger">
              Open Netflix
            </button>
            <button type="button" id="close-window-btn" class="settings-btn settings-btn--ghost">
              Close Window
            </button>
          </div>
        </div>

        <div class="settings-overlay" aria-hidden="true">
          <div class="settings-auth-panel" aria-hidden="true">
            <div class="settings-auth" role="dialog" aria-modal="true" aria-labelledby="settings-auth-title">
              <h2 id="settings-auth-title" class="settings-title">Unlock Settings</h2>
              <p class="settings-auth__hint">Enter the password to access kiosk settings.</p>
              <label class="settings-field settings-field--compact">
                <span class="settings-field__label">Password</span>
                <input id="settings-auth-input" type="password" class="settings-field__input settings-auth__input" autocomplete="current-password" />
              </label>
              <p id="settings-auth-error" class="settings-auth__error" role="alert" aria-live="assertive"></p>
              <div class="settings-actions settings-actions--auth">
                <button type="button" class="settings-btn settings-btn--primary" id="settings-auth-submit">Unlock</button>
                <button type="button" class="settings-btn settings-btn--ghost" id="settings-auth-cancel">Cancel</button>
              </div>
            </div>
          </div>

          <div class="settings-dialog" role="dialog" aria-modal="true" aria-labelledby="settings-title">
            <div class="settings-dialog__header">
              <div>
                <h2 id="settings-title" class="settings-title">Settings</h2>
                <p class="settings-subtitle">Kiosk behaviour, remote config and security.</p>
              </div>
            </div>

            <div class="settings-dialog__content">
              <div class="settings-grid">
              <div class="settings-panel">
                <section>
                  <span class="settings-section-title">Navigation</span>
                  <label class="settings-field">
                    <span class="settings-field__label">Start URL</span>
                    <div class="settings-url-input">
                      <select id="settings-url-protocol" class="settings-url-input__protocol">
                        <option value="https://">https://</option>
                        <option value="http://">http://</option>
                      </select>
                      <input id="settings-url-input" class="settings-field__input" type="text" placeholder="example.com" />
                    </div>
                  </label>
                  <div class="settings-history" id="home-history-chips-container">
                    <div class="settings-history__chips" id="home-history-chips"></div>
                  </div>
                </section>

                <section>
                  <span class="settings-section-title">Appearance & Browser</span>
                  <label class="settings-field">
                    <span class="settings-field__label">Custom User Agent</span>
                    <input id="settings-user-agent" class="settings-field__input" type="text" placeholder="Default browser UA" />
                  </label>
                  <div class="settings-history" id="ua-history-chips-container">
                    <div class="settings-history__chips" id="user-agent-history-chips"></div>
                  </div>

                  <div class="settings-window-options">
                    <label class="settings-switch">
                      <input id="always-on-top" type="checkbox" />
                      <span>Always on top</span>
                    </label>
                    <label class="settings-switch">
                      <input id="osk-enabled" type="checkbox" />
                      <span>On-screen keyboard</span>
                    </label>
                    <button type="button" class="settings-btn settings-btn--ghost" id="settings-fs-toggle">
                      <span class="settings-btn__label--fs">Fullscreen</span>
                    </button>
                  </div>
                </section>
              </div>

              <div class="settings-panel">
                <section>
                  <span class="settings-section-title">Remote Configuration</span>
                  <label class="settings-field">
                    <span class="settings-field__label">Config URL</span>
                    <input id="settings-remote-config-url" class="settings-field__input" type="url" placeholder="https://api.example.com/config" />
                    <span class="settings-field__hint">Overrides local URL/UA settings.</span>
                  </label>
                  <button type="button" class="settings-btn settings-btn--ghost" id="settings-remote-fetch">Fetch Now</button>
                  <div id="remote-config-status" class="settings-status"></div>
                </section>

                <section>
                  <span class="settings-section-title">Security</span>
                  <div class="settings-field">
                    <input id="settings-password-current" class="settings-field__input" type="password" placeholder="Current Password" />
                    <input id="settings-password-new" class="settings-field__input" type="password" placeholder="New Password" />
                    <input id="settings-password-confirm" class="settings-field__input" type="password" placeholder="Confirm New" />
                  </div>
                  <button type="button" class="settings-btn settings-btn--warn" id="settings-update-password">Update Security</button>
                  <div id="settings-password-status" class="settings-status"></div>
                </section>
              </div>
            </div>
            </div>

            <div class="settings-actions">
              <button type="button" class="settings-btn settings-btn--danger settings-btn--force-exit" id="settings-force-exit">Force Quit</button>
              <button type="button" class="settings-btn settings-btn--primary settings-save-btn" id="settings-save">Save</button>
              <button type="button" class="settings-btn settings-btn--ghost settings-cancel-btn" id="settings-cancel">Cancel</button>
            </div>
          </div>
        </div>

        <div class="osk-overlay" aria-hidden="true">
          <div class="osk" role="group" aria-label="On-screen keyboard">
            <div class="osk-header" role="presentation">
              <span class="osk-header__title">On-screen keyboard</span>
              <div class="osk-header__actions">
                <button type="button" class="osk-header__btn osk-header__btn--icon" data-action="minimize" aria-label="Minimize keyboard" aria-pressed="false"></button>
                <button type="button" class="osk-header__btn osk-header__btn--close" data-action="hide" aria-label="Hide keyboard">&times;</button>
              </div>
            </div>
            <div class="osk-row" data-row="num">
              <button data-key="1">1</button><button data-key="2">2</button><button data-key="3">3</button><button data-key="4">4</button><button data-key="5">5</button><button data-key="6">6</button><button data-key="7">7</button><button data-key="8">8</button><button data-key="9">9</button><button data-key="0">0</button><button data-action="backspace" class="osk-key--wide">⌫</button>
            </div>
            <div class="osk-row" data-row="alpha1">
              <button data-key="a">a</button><button data-key="b">b</button><button data-key="c">c</button><button data-key="d">d</button><button data-key="e">e</button><button data-key="f">f</button><button data-key="g">g</button><button data-key="h">h</button><button data-key="i">i</button><button data-key="j">j</button>
            </div>
            <div class="osk-row" data-row="alpha2">
              <button data-key="k">k</button><button data-key="l">l</button><button data-key="m">m</button><button data-key="n">n</button><button data-key="o">o</button><button data-key="p">p</button><button data-key="q">q</button><button data-key="r">r</button><button data-key="s">s</button><button data-key="t">t</button>
            </div>
            <div class="osk-row" data-row="alpha3">
              <button data-action="shift" class="osk-key--wide">Shift</button><button data-key="u">u</button><button data-key="v">v</button><button data-key="w">w</button><button data-key="x">x</button><button data-key="y">y</button><button data-key="z">z</button><button data-key=".">.</button><button data-key="/">/</button>
            </div>
            <div class="osk-row" data-row="space">
              <button data-action="space" class="osk-key--space">Space</button><button data-action="enter" class="osk-key--enter">Enter</button><button data-action="hide" class="osk-key--wide">Hide</button>
            </div>
            <div class="osk-resizer" role="presentation" aria-hidden="true"></div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
